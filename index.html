<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title...">
            <div id="suggestions" class="suggestions"></div>
        </div>
        
        <div class="filter-container">
            <div class="slider-group">
                <label>Min views: <span id="minValue">0</span></label>
                <input type="range" id="minViewRange" min="0" max="1000" value="0" class="slider">
            </div>
            <div class="slider-group">
                <label>Max views: <span id="maxValue">1000</span></label>
                <input type="range" id="maxViewRange" min="0" max="1000" value="1000" class="slider">
            </div>
        </div>

        <div id="results" class="results-grid"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
